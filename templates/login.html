<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HydroScan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary:    #1a1d20;
      --bg-card:       #212529;
      --accent-cyan:   #00d4ff;
      --accent-amber:  #ffb300;
      --accent-danger: #ff4d4d;
      --accent-green:  #00e676;
      --text-primary:  #e8eaed;
      --text-muted:    #9aa0a6;
      --border:        rgba(255,255,255,0.08);
      --shadow:        0 8px 32px rgba(0,0,0,0.5);
      --radius:        14px;
      --transition:    0.3s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
 
    /* ── Arrière-plan : grille de points + glows ── */
    .bg-dots {
      position: fixed; inset: 0; z-index: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 600px 500px at 20% 50%, rgba(0,212,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 400px 350px at 80% 20%, rgba(255,179,0,0.04) 0%, transparent 65%),
        radial-gradient(ellipse 350px 300px at 75% 80%, rgba(0,212,255,0.04) 0%, transparent 60%);
    }
 
    /* ── Particules SVG déco ── */
    .bg-lines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: .35;
    }
 
    /* ── Boîte login centrée ── */
    .login-wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 400px;
      padding: 0 16px;
      animation: fadeUp .5s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(14px); }
      to   { opacity:1; transform: translateY(0); }
    }
 
    .login-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 36px 36px;
      box-shadow: var(--shadow), 0 0 0 1px rgba(0,212,255,0.04);
    }
 
    /* ── Logo centré ── */
    .logo-area {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      margin-bottom: 32px;
    }
    .logo-icon-wrap {
      width: 76px; height: 76px;
      background: rgba(0,212,255,0.06);
      border: 1px solid rgba(0,212,255,0.18);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 0 24px rgba(0,212,255,0.08);
    }
    .logo-icon-wrap::after {
      content:''; position:absolute; inset:-1px; border-radius:18px;
      background: linear-gradient(135deg, rgba(0,212,255,0.12), transparent 55%);
      pointer-events:none;
    }
    .logo-name {
      font-size: 22px; font-weight: 700; letter-spacing: .5px;
      color: var(--text-primary);
    }
    .logo-name span { color: var(--accent-cyan); }
    .logo-sub {
      font-size: 11px; color: var(--text-muted); text-align: center; line-height: 1.5;
      margin-top: -6px;
    }
 
    /* ── Champs ── */
    .fg { margin-bottom: 18px; position: relative; }
    .fl {
      display: block; font-size: 10px; text-transform: uppercase;
      letter-spacing: .7px; color: var(--text-muted); margin-bottom: 7px; font-weight: 500;
    }
    .fi {
      width: 100%; background: var(--bg-primary);
      border: 1px solid var(--border); color: var(--text-primary);
      border-radius: 9px; padding: 11px 13px; font-size: 13px;
      font-family: 'Inter', sans-serif; outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .fi:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.12);
    }
    .fi.is-invalid { border-color: var(--accent-danger); }
    .fi.is-invalid:focus { box-shadow: 0 0 0 3px rgba(255,77,77,0.1); }
    .fi.is-valid   { border-color: var(--accent-green); }
 
    /* Message d'aide sous le champ */
    .field-msg {
      font-size: 11px; margin-top: 6px; min-height: 16px;
      transition: color .2s; display: flex; align-items: center; gap: 5px;
      color: transparent;
    }
    .field-msg.error  { color: var(--accent-danger); }
    .field-msg.hint   { color: var(--text-muted); }
    .field-msg.ok     { color: var(--accent-green); }
 
    /* Barre de force mot de passe */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-seg {
      flex: 1; height: 3px; border-radius: 2px;
      background: rgba(255,255,255,0.07);
      transition: background .3s;
    }
 
    /* Œil mot de passe */
    .pw-wrap { position: relative; }
    .pw-wrap .fi { padding-right: 42px; }
    .eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 15px; padding: 4px;
      transition: color var(--transition); line-height: 1;
    }
    .eye:hover { color: var(--text-primary); }
 
    /* ── Bouton Se connecter ── */
    .btn-login {
      width: 100%; padding: 12px; border-radius: 9px; border: none;
      background: var(--accent-cyan); color: #0a0c0f;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .25s, box-shadow .25s, transform .15s;
      position: relative;
    }
    .btn-login:hover:not(:disabled) {
      background: #1adbff;
      box-shadow: 0 0 28px rgba(0,212,255,0.45), 0 0 8px rgba(0,212,255,0.2);
      transform: translateY(-1px);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: .65; cursor: not-allowed; }
    .btn-login.success {
      background: var(--accent-green) !important;
      box-shadow: 0 0 24px rgba(0,230,118,0.35) !important;
    }
 
    .spin {
      width: 15px; height: 15px;
      border: 2px solid rgba(0,0,0,0.2); border-top-color: #0a0c0f;
      border-radius: 50%; animation: sp .7s linear infinite; display: none;
    }
    .loading .spin    { display: block; }
    .loading .btn-txt { display: none; }
 
    /* ── Message global (serveur KO) ── */
    .global-msg {
      display: none; margin-bottom: 14px;
      padding: 9px 13px; border-radius: 8px; font-size: 12px;
      align-items: center; gap: 8px;
    }
    .global-msg.show  { display: flex; }
    .global-msg.error { background: rgba(255,77,77,0.1); border: 1px solid rgba(255,77,77,0.25); color: var(--accent-danger); }
    .global-msg.warn  { background: rgba(255,179,0,0.1); border: 1px solid rgba(255,179,0,0.25); color: var(--accent-amber); }
 
    .footer-note {
      font-size: 10px; color: var(--text-muted); text-align: center; margin-top: 20px;
      line-height: 1.7;
    }
 
    @keyframes sp    { to { transform: rotate(360deg); } }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-5px); }
      40%,80% { transform: translateX(5px); }
    }
    .shake { animation: shake .35s ease; }
  </style>
</head>
<body>
 
  <!-- Arrière-plan -->
  <div class="bg-dots"></div>
  <div class="bg-glow"></div>
 
  <!-- Lignes décoratives SVG -->
  <svg class="bg-lines" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
    <line x1="0" y1="200" x2="400" y2="450" stroke="#00d4ff" stroke-width=".6"/>
    <line x1="1440" y1="100" x2="1000" y2="400" stroke="#00d4ff" stroke-width=".6"/>
    <line x1="200" y1="900" x2="500" y2="600" stroke="#ffb300" stroke-width=".5"/>
    <line x1="1300" y1="800" x2="900" y2="500" stroke="#00d4ff" stroke-width=".4"/>
    <circle cx="120" cy="180" r="40" fill="none" stroke="#00d4ff" stroke-width=".5"/>
    <circle cx="1350" cy="700" r="60" fill="none" stroke="#ffb300" stroke-width=".4"/>
    <circle cx="700" cy="50"  r="25" fill="none" stroke="#00d4ff" stroke-width=".5"/>
  </svg>
 
  <!-- ══ Boîte login ══ -->
  <div class="login-wrap">
    <div class="login-box" id="login-box">
 
      <!-- Logo réacteur industriel -->
      <div class="logo-area">
        <div class="logo-icon-wrap">
          <svg width="46" height="52" viewBox="0 0 52 58" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Logo réacteur industriel HydroScan">
            <rect x="14" y="4"  width="24" height="36" rx="5" fill="rgba(0,212,255,0.06)" stroke="#00d4ff" stroke-width="1.3"/>
            <rect x="18" y="7"  width="16" height="7"  rx="2.5" fill="rgba(0,212,255,0.15)" stroke="#00d4ff" stroke-width="0.9"/>
            <line x1="26" y1="14" x2="26" y2="21" stroke="#00d4ff" stroke-width="1.1" opacity=".55"/>
            <circle cx="26" cy="26" r="5.5" fill="rgba(0,212,255,0.18)" stroke="#00d4ff" stroke-width="1.2"/>
            <circle cx="26" cy="26" r="2"   fill="#00d4ff"/>
            <circle cx="26" cy="20.5" r="1" fill="none" stroke="#00d4ff" stroke-width=".8" opacity=".6"/>
            <circle cx="26" cy="31.5" r="1" fill="none" stroke="#00d4ff" stroke-width=".8" opacity=".6"/>
            <line x1="26" y1="31.5" x2="26" y2="37" stroke="#00d4ff" stroke-width="1.1" opacity=".55"/>
            <rect x="18" y="37" width="16" height="7" rx="2.5" fill="rgba(255,179,0,0.14)" stroke="#ffb300" stroke-width="0.9"/>
            <line x1="14" y1="26" x2="6"  y2="26" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2 2" opacity=".5"/>
            <rect x="2"  y="23" width="4" height="6" rx="1.5" fill="none" stroke="#00d4ff" stroke-width=".8" opacity=".5"/>
            <line x1="38" y1="26" x2="46" y2="26" stroke="#00d4ff" stroke-width="1" stroke-dasharray="2 2" opacity=".5"/>
            <rect x="46" y="23" width="4" height="6" rx="1.5" fill="none" stroke="#00d4ff" stroke-width=".8" opacity=".5"/>
            <rect x="10" y="44" width="32" height="10" rx="3" fill="rgba(255,179,0,0.08)" stroke="#ffb300" stroke-width=".9"/>
            <line x1="17" y1="48" x2="35" y2="48" stroke="#ffb300" stroke-width=".8" opacity=".6"/>
            <line x1="17" y1="50.5" x2="29" y2="50.5" stroke="#ffb300" stroke-width=".8" opacity=".3"/>
          </svg>
        </div>
        <div class="logo-name">Hydro<span>Scan</span></div>
        <div class="logo-sub">Système de surveillance — Hydrogénation industrielle</div>
      </div>
 
      <!-- Message global erreur/warning -->
      <div class="global-msg" id="global-msg">
        <span id="global-msg-text"></span>
      </div>
 
      <form id="login-form" novalidate>
 
        <!-- Email -->
        <div class="fg">
          <label class="fl" for="email">Adresse email</label>
          <input type="email" id="email" class="fi" placeholder="votre@email.com" autocomplete="email">
          <div class="field-msg hint" id="msg-email">Entrez votre adresse email professionnelle.</div>
        </div>
 
        <!-- Mot de passe -->
        <div class="fg">
          <label class="fl" for="pwd">Mot de passe</label>
          <div class="pw-wrap">
            <input type="password" id="pwd" class="fi" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="eye" id="eye-btn" aria-label="Afficher le mot de passe">
              <!-- Icône œil SVG inline -->
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="strength-bar" id="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <div class="field-msg hint" id="msg-pwd">Le mot de passe doit contenir au moins 8 caractères.</div>
        </div>
 
        <button type="submit" class="btn-login" id="loginbtn">
          <div class="spin"></div>
          <span class="btn-txt">Se connecter →</span>
        </button>
 
      </form>
 
      <p class="footer-note">
        Accès restreint au personnel autorisé.<br>
        En vous connectant vous acceptez les conditions d'utilisation de HydroScan.
      </p>
    </div>
  </div>
 
<script>
  // ── Barre de force mot de passe ──
  const segs  = [1,2,3,4].map(i => document.getElementById('seg'+i));
  const colors = ['#ff4d4d','#ffb300','#00d4ff','#00e676'];
 
  function pwStrength(v) {
    let s = 0;
    if (v.length >= 8)  s++;
    if (v.length >= 12) s++;
    if (/[A-Z]/.test(v) || /[0-9]/.test(v)) s++;
    if (/[^a-zA-Z0-9]/.test(v)) s++;
    return s;
  }
 
  document.getElementById('pwd').addEventListener('input', function() {
    const v = this.value;
    const s = v.length ? pwStrength(v) : 0;
    const labels = ['','Trop court','Moyen','Bon','Fort'];
    segs.forEach((seg, i) => {
      seg.style.background = i < s ? colors[s-1] : 'rgba(255,255,255,0.07)';
    });
    const msgEl = document.getElementById('msg-pwd');
    if (!v) {
      setMsg('msg-pwd', 'hint', 'Le mot de passe doit contenir au moins 8 caractères.');
    } else if (v.length < 8) {
      setMsg('msg-pwd', 'error', '⚠ Trop court — minimum 8 caractères requis.');
    } else {
      setMsg('msg-pwd', 'ok', '✓ ' + (labels[s] || 'Bon') + ' — mot de passe accepté.');
    }
    this.classList.remove('is-invalid','is-valid');
  });
 
  // ── Validation email en temps réel ──
  document.getElementById('email').addEventListener('input', function() {
    this.classList.remove('is-invalid','is-valid');
    if (!this.value) {
      setMsg('msg-email','hint','Entrez votre adresse email professionnelle.');
    } else if (!/\S+@\S+\.\S+/.test(this.value)) {
      setMsg('msg-email','error','⚠ Format invalide — exemple : nom@domaine.com');
    } else {
      setMsg('msg-email','ok','✓ Adresse email valide.');
      this.classList.add('is-valid');
    }
  });
 
  function setMsg(id, type, text) {
    const el = document.getElementById(id);
    el.className = 'field-msg ' + type;
    el.textContent = text;
  }
 
  // ── Toggle œil ──
  document.getElementById('eye-btn').addEventListener('click', function() {
    const inp  = document.getElementById('pwd');
    const icon = document.getElementById('eye-icon');
    const show = inp.type === 'text';
    inp.type = show ? 'password' : 'text';
    icon.innerHTML = show
      ? '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
      : '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
  });
 
  // ── Soumission ──
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const emailEl = document.getElementById('email');
    const pwdEl   = document.getElementById('pwd');
    const btn     = document.getElementById('loginbtn');
    const gMsg    = document.getElementById('global-msg');
    let valid = true;
 
    // Validation email
    if (!emailEl.value.trim() || !/\S+@\S+\.\S+/.test(emailEl.value)) {
      emailEl.classList.add('is-invalid');
      setMsg('msg-email','error','⚠ Veuillez entrer une adresse email valide (ex : nom@domaine.com).');
      valid = false;
    }
 
    // Validation mot de passe
    if (pwdEl.value.length < 8) {
      pwdEl.classList.add('is-invalid');
      setMsg('msg-pwd','error','⚠ Le mot de passe doit contenir au moins 8 caractères.');
      valid = false;
    }
 
    if (!valid) {
      document.getElementById('login-box').classList.add('shake');
      setTimeout(() => document.getElementById('login-box').classList.remove('shake'), 400);
      return;
    }
 
    // Masquer message global
    gMsg.className = 'global-msg';
 
    // Spinner
    btn.classList.add('loading'); btn.disabled = true;
 
    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailEl.value, password: pwdEl.value })
      });
      const data = await res.json();
 
      if (res.ok && data.success) {
        btn.classList.remove('loading');
        btn.classList.add('success');
        btn.innerHTML = '<span class="btn-txt">✓ Connexion réussie — redirection…</span>';
        setTimeout(() => window.location.href = '/dashboard', 900);
      } else {
        btn.classList.remove('loading'); btn.disabled = false;
        gMsg.className = 'global-msg error show';
        document.getElementById('global-msg-text').textContent =
          '⚠ ' + (data.message || 'Identifiants incorrects. Vérifiez votre email et mot de passe.');
        document.getElementById('login-box').classList.add('shake');
        setTimeout(() => document.getElementById('login-box').classList.remove('shake'), 400);
      }
    } catch {
      btn.classList.remove('loading'); btn.disabled = false;
      gMsg.className = 'global-msg warn show';
      document.getElementById('global-msg-text').textContent =
        '⚠ Serveur inaccessible. Vérifiez votre connexion ou réessayez dans quelques instants.';
    }
  });
</script>
</body>
</html>
